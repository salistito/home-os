# fly.toml app configuration file generated for home-os-maristian on 2026-07-05T20:54:49-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'home-os-maristian'
primary_region = 'gru'

[build]
  dockerfile = 'apps/bots/telegram/Dockerfile'

[env]
  HOME_OS_DB_PATH = '/app/data/homeos.db'
  TZ = 'America/Santiago'

[[mounts]]
  source = 'homeos_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
